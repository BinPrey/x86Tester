# Reference: https://build-cpp.github.io/cmkr/cmake-toml
[cmake]
version = "3.25"

[project]
name = "x86Tester"

[subdir.thirdparty]

[target.x86Tester-core]
type = "static"
alias = "x86Tester::core"
sources = ["src/core/logging.cpp", "src/core/cpuid.cpp"]
windows.sources = ["src/core/sysinfo.win32.cpp"]
linux.sources = ["src/core/sysinfo.linux.cpp"]
headers = ["include/x86Tester/logging.hpp", "include/x86Tester/cpuid.hpp", "include/x86Tester/parallel.hpp", "src/core/sysinfo.hpp"]
link-libraries = ["Zydis", "sfl", "fmt::fmt"]
compile-features = ["cxx_std_20"]
include-directories = ["include"]
private-include-directories = ["src/core"]

[target.x86Tester-core.properties]
PROJECT_LABEL = "core"

[target.x86Tester-execution]
type = "static"
alias = "x86Tester::execution"
sources = ["src/execution/execution.cpp"]
windows.sources = ["src/execution/execution.win32.cpp"]
linux.sources = ["src/execution/execution.linux.cpp"]
headers = ["include/x86Tester/execution.hpp"]
private-include-directories = ["src/execution", "include/x86Tester"]
include-directories = ["include"]
compile-features = ["cxx_std_20"]
link-libraries = ["x86Tester::core"]

[target.x86Tester-execution.properties]
PROJECT_LABEL = "execution"

[target.x86Tester-generator]
type = "static"
alias = "x86Tester::generator"
sources = ["src/generator/instrgenerator.cpp", "src/generator/matrixgenerator.cpp"]
headers = ["include/x86Tester/generator.hpp", "include/x86Tester/basegenerator.hpp", "include/x86Tester/inputgenerator.hpp"]
private-include-directories = ["src/generator", "include/x86Tester"]
include-directories = ["include"]
compile-features = ["cxx_std_20"]
link-libraries = ["x86Tester::core", "x86Tester::execution"]

[target.x86Tester-generator.properties]
PROJECT_LABEL = "generator"

[target.x86Tester-cli]
type = "executable"
sources = ["src/cli/main.cpp", "src/cli/generator.cpp", "src/cli/sandbox.cpp"]
headers = ["src/cli/utils.hpp", "src/cli/cli.hpp"]
compile-features = ["cxx_std_20"]
private-link-libraries = ["x86Tester::core", "x86Tester::generator", "x86Tester::execution"]
msvc.link-options = ["/DEBUG", "/OPT:REF", "/OPT:ICF", "/BASE:0x4000000", "/DYNAMICBASE:NO"]
cmake-after = """
if(NOT DEFINED X86TESTER_VERSION OR X86TESTER_VERSION STREQUAL "")
  set(X86TESTER_VERSION "0.0.0-dev")
  find_package(Git QUIET)
  if(GIT_FOUND)
    execute_process(COMMAND "${GIT_EXECUTABLE}" rev-parse --abbrev-ref HEAD
      WORKING_DIRECTORY "${CMAKE_CURRENT_SOURCE_DIR}"
      OUTPUT_VARIABLE X86TESTER_BRANCH OUTPUT_STRIP_TRAILING_WHITESPACE ERROR_QUIET)
    execute_process(COMMAND "${GIT_EXECUTABLE}" rev-parse --short HEAD
      WORKING_DIRECTORY "${CMAKE_CURRENT_SOURCE_DIR}"
      OUTPUT_VARIABLE X86TESTER_HASH OUTPUT_STRIP_TRAILING_WHITESPACE ERROR_QUIET)
    if(X86TESTER_BRANCH MATCHES "^release/v?(.+)$")
      set(X86TESTER_VERSION "${CMAKE_MATCH_1}")
    elseif(X86TESTER_HASH)
      set(X86TESTER_VERSION "0.0.0-dev+${X86TESTER_HASH}")
    endif()
  endif()
endif()
message(STATUS "x86Tester version: ${X86TESTER_VERSION}")
target_compile_definitions(x86Tester-cli PRIVATE X86TESTER_VERSION="${X86TESTER_VERSION}")
"""

[target.x86Tester-cli.properties]
PROJECT_LABEL = "cli"

[target.x86Tester-tests]
type = "executable"
sources = ["src/tests/main.cpp", "src/tests/test.execution.cpp", "src/tests/test.parallel.cpp"]
compile-features = ["cxx_std_20"]
private-link-libraries = ["x86Tester::core", "x86Tester::generator", "x86Tester::execution", "GTest::gtest"]

[target.x86Tester-tests.properties]
PROJECT_LABEL = "tests"